name: CI/CD — Library Management System

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE:  ${{ secrets.DOCKER_USERNAME }}/library-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/library-frontend

jobs:
  # ════════════════════════════════════════════════════════════
  # Job 1: Backend — Lint + Tests
  # ════════════════════════════════════════════════════════════
  backend-ci:
    name: 🐍 Backend (Django Tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       test_library_db
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY:   test-secret-key-for-ci-only
      DEBUG:        True
      DB_NAME:      test_library_db
      DB_USER:      postgres
      DB_PASSWORD:  postgres
      DB_HOST:      localhost
      DB_PORT:      5432

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: 🔍 Lint with flake8
        working-directory: backend
        run: flake8 apps/ library_project/ --max-line-length=100 --exclude=migrations

      - name: 🧪 Run tests with coverage
        working-directory: backend
        run: |
          pytest --cov=apps --cov-report=xml --cov-report=term-missing -v

      - name: 📊 Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ════════════════════════════════════════════════════════════
  # Job 2: Frontend — Lint + Build
  # ════════════════════════════════════════════════════════════
  frontend-ci:
    name: ⚛️ Frontend (React Build)
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔍 Lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: 🏗️ Build production
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: 📁 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3: Docker Build & Push (main branch only)
  # ════════════════════════════════════════════════════════════
  docker-push:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL || 'http://localhost:8000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
