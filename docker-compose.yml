services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-library_db}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-library_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library_net

  # ── Django Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DEBUG:                  ${DEBUG:-False}
      SECRET_KEY:             ${SECRET_KEY:-change-me-in-production}
      DB_NAME:                ${DB_NAME:-library_db}
      DB_USER:                ${DB_USER:-postgres}
      DB_PASSWORD:            ${DB_PASSWORD:-postgres}
      DB_HOST:                db
      DB_PORT:                5432
      CORS_ALLOWED_ORIGINS:   ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://localhost:5173}
      ALLOWED_HOSTS:          ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      JWT_ACCESS_MINUTES:     ${JWT_ACCESS_MINUTES:-60}
      JWT_REFRESH_DAYS:       ${JWT_REFRESH_DAYS:-7}
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - library_net
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  # ── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - library_net

volumes:
  postgres_data:
  media_files:
  static_files:

networks:
  library_net:
    driver: bridge
